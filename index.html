<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>DIAMOND AI · Веб‑помощник</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/mhchem.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked-katex-extension@5.0.0/lib/index.umd.js"></script>
    <!-- DOMPurify для безопасного рендеринга Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.11/dist/purify.min.js"></script>
</head>
<body>
    <!-- Загрузочный экран -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-content">
            <div class="welcome-title">DIAMOND AI</div>
            <div class="loading-status" id="loadingStatus">Загрузка нейронных связей</div>
            <div class="loading-bar-container">
                <div class="loading-bar" id="loadingBar"></div>
            </div>
        </div>
        <img src="https://cdn.discordapp.com/attachments/1223595469746475049/1486732262929338378/IMG_8307.PNG?ex=69c692d1&is=69c54151&hm=7db5f0ac235605888c45452d53c38e8db57d2b4fda5a6f36e6dfe9ed50c85883&" class="loading-character" id="loadingCharacter" alt="character">
    </div>

    <!-- Экран входа (только по своему ключу) -->
    <div class="choice-screen" id="choiceScreen" style="display: none;">
        <div class="choice-container">
            <div class="logo">
                <img src="https://media.discordapp.net/attachments/1223595469746475049/1486731541206798480/image_2026-03-26_17-18-341.png?ex=69c69225&is=69c540a5&hm=8e6b4f1dd2f6fdb00fe6957dbe357634eb2e1c514787d2f0e9fb392ed893785b&=&format=webp&quality=lossless&width=1858&height=434" alt="DIAMOND AI Logo" class="logo-img">
                <h1>DIAMOND AI</h1>
                <p>Для начала работы введите API-ключ OpenRouter</p>
            </div>
            <div class="api-input-section" id="apiInputSection" style="display: block;">
                <div class="input-group">
                    <label>API-ключ OpenRouter</label>
                    <div class="input-wrapper">
                        <i class="fas fa-key"></i>
                        <input type="password" id="apiKeyInput" placeholder="sk-or-v1-...">
                    </div>
                </div>
                <button class="btn btn-primary" id="submitApiKeyBtn"><i class="fas fa-arrow-right"></i> Войти</button>
                <p class="footer-note">
                    <a href="https://openrouter.ai/keys" target="_blank"><i class="fas fa-external-link-alt"></i> Получить ключ</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Основной интерфейс чата -->
    <div class="main-ui" id="mainUI" style="display: none;">
        <header class="title-bar">
            <div class="title-bar-left">
                <button class="sidebar-toggle-btn" id="sidebarToggleBtn" title="Показать/скрыть панель">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="logo-icon" id="logoIcon">
                    <img src="https://media.discordapp.net/attachments/1223595469746475049/1486731541206798480/image_2026-03-26_17-18-341.png?ex=69c69225&is=69c540a5&hm=8e6b4f1dd2f6fdb00fe6957dbe357634eb2e1c514787d2f0e9fb392ed893785b&=&format=webp&quality=lossless&width=1858&height=434" alt="logo" id="logoImage">
                </div>
                <div class="action-buttons-group" id="actionButtonsGroup" style="display: none;">
                    <button class="action-btn-group" id="expandSidebarBtn" title="Развернуть боковую панель"><i class="fas fa-bars"></i></button>
                    <button class="action-btn-group" id="newChatCollapsedBtn" title="Новый чат"><i class="fas fa-feather-alt"></i></button>
                    <button class="action-btn-group" id="foldersCollapsedBtn" title="Папки"><i class="fas fa-folder"></i></button>
                    <button class="action-btn-group" id="genhabCollapsedBtn" title="ГенХаб"><i class="fas fa-magic"></i></button>
                </div>
            </div>
            <div class="window-controls" style="-webkit-app-region: no-drag;"></div>
        </header>

        <div class="app-container">
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <div class="action-buttons-frame" id="actionButtonsFrame">
                        <button id="new-chat-btn" class="frame-btn" title="Новый чат"><i class="fas fa-feather-alt"></i></button>
                        <button id="folders-page-btn" class="frame-btn" title="Папки"><i class="fas fa-folder"></i></button>
                        <button id="genhab-page-btn" class="frame-btn" title="ГенХаб"><i class="fas fa-magic"></i></button>
                    </div>
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="history-search" placeholder="Поиск в истории...">
                    </div>
                </div>
                <div class="history-list" id="history-list"></div>
                <div class="user-panel" id="userPanel">
                    <div class="user-avatar" id="userAvatarPanel">
                        <img id="userAvatarImg" src="" alt="avatar">
                    </div>
                    <div class="user-info">
                        <div class="user-name" id="userNameDisplay">Пользователь</div>
                    </div>
                    <button class="user-menu-btn" id="userMenuBtn"><i class="fas fa-ellipsis-v"></i></button>
                    <div class="user-dropdown" id="userDropdown">
                        <button id="dropdown-discord"><i class="fab fa-discord"></i> Discord-сервер</button>
                        <button id="dropdown-terms"><i class="fas fa-file-contract"></i> Terms of Use</button>
                        <button id="dropdown-privacy"><i class="fas fa-shield-alt"></i> Privacy Policy</button>
                        <button id="dropdown-logout"><i class="fas fa-sign-out-alt"></i> Выйти</button>
                    </div>
                </div>
            </aside>
            <main class="chat-area">
                <div class="chat-view" id="chatView">
                    <div class="messages-container" id="messages-container"></div>
                    <div class="input-area" id="inputArea">
                        <div class="input-wrapper">
                            <textarea id="user-input" placeholder="Введите свой запрос..." rows="1"></textarea>
                            <button class="stop-btn" id="stop-btn" style="display: none;" title="Остановить генерацию">
                                <i class="fas fa-stop"></i>
                            </button>
                            <button class="send-btn" id="send-btn" disabled>
                                <i class="fas fa-arrow-up"></i>
                            </button>
                        </div>
                        <div class="input-footer">ИИ-Генерация, только для справки</div>
                    </div>
                </div>
                <div class="folders-page" id="foldersPage" style="display: none;">
                    <!-- содержимое папок -->
                </div>
                <div class="genhab-page" id="genhabPage" style="display: none;">
                    <!-- ГенХаб в разработке -->
                </div>
            </main>
        </div>
    </div>

    <!-- Модалки -->
    <div id="avatar-modal" class="avatar-modal" style="display: none;"><!-- содержимое --></div>
    <div id="rename-user-modal" class="rename-modal" style="display: none;"><!-- содержимое --></div>
    <div id="folder-edit-modal" class="folder-edit-modal" style="display: none;"><!-- содержимое --></div>
    <div id="folder-chats-modal" class="folder-chats-modal" style="display: none;"><!-- содержимое --></div>
    <div id="terms-modal" class="terms-modal" style="display: none;"><!-- содержимое --></div>
    <div id="privacy-modal" class="privacy-modal" style="display: none;"><!-- содержимое --></div>
    <div id="toast-container" class="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
